zh:
  name: 李美璇
  nameAlt: Meixuan Jade Li
  title: 助理教授
  affiliation: 国防科技大学 (NUDT)
  email: limeixuan1997@outlook.com
  orcid: 0000-0002-1569-6210
  nav:
    home: 首页
    research: 研究方向
    publications: 论文成果
    gallery: 研究成果
    vibecoding: AI关系图谱
    daily: 日常分享
  hero:
    greeting: 欢迎访问我的学术主页
    desc: 国防科技大学助理教授。研究方向包括：(1) 大规模复杂系统基础科学问题, 故障传播、相变行为与涌现行为；(2) 信息物理系统, 韧性、分布式自主控制与电力系统可再生能源集成；(3) 大规模无人集群, 可扩展自主协同、涌现群体智能与支撑集群自主的通信数据基座。
  directions:
    title: 研究方向
    d1:
      title: 大规模复杂系统
      subtitle: 基础科学问题 · 故障传播 · 相变行为 · 涌现行为
      content: 揭示复杂网络系统中级联故障传播的普适性规律，刻画稳定与崩溃状态之间的相变行为，阐明网络拓扑、相互依赖结构与组件动力学如何共同决定系统级鲁棒性，建立微观节点相互作用与宏观系统行为之间的理论桥梁。
      innovation: "主要贡献：发现了超越特定系统类型的普适性传播标度律, 级联动力学遵循可预测的相变模式，仅由少量拓扑不变量支配。提出了连接稳态脆弱性与动态崩溃的统一理论框架，使韧性原理可跨领域从电力网络迁移至更广泛的复杂系统。"
      keywords:
        - 级联故障
        - 相变
        - 网络普适性
        - 复杂系统
        - 涌现行为
        - 拓扑不变量
    d2:
      title: 信息物理系统
      subtitle: 韧性 · 分布式自主控制 · 电力系统 · 可再生能源
      content: 研究可再生能源逆变器资源(IBR)对信息物理电力网络级联故障的影响，分析级联过程中电压不稳定节点间的相互依赖关系，确定最优IBR配置位置，设计高可再生能源渗透下具有最大韧性的电网拓扑结构。
      innovation: "主要贡献：率先揭示了IBR对级联故障动力学的影响, 发现若选址不当，高比例IBR渗透反而会增加故障风险；提出了一个面向电网韧性增强的最优IBR配置系统框架，建立了协调可再生能源集成与系统稳定性的设计原则。"
      keywords:
        - 信息物理系统
        - 韧性
        - 分布式自主控制
        - IBR
        - 电网拓扑
    d3:
      title: 大规模无人集群
      subtitle: 可扩展自主协同 · 涌现群体智能 · 通信与数据基座
      content: 是什么制约了集群走向大规模自主协同？我们聚焦三大核心瓶颈：动态环境下的通信中断、大规模节点的决策失效、以及任务复杂度的指数增长。研究目标是激发涌现群体智能，让成千上万的自主体自发协同，完成远超个体能力的复杂使命。为此，我们构建两大关键基座：抗干扰弹性通信网络确保信息高效共享，自适应数据分发算法则随集群规模无缝扩展。
      innovation: "主要贡献：在真实EMI攻击场景下定量刻画了无人机集群韧性；提出了难度感知的分布式备份策略，能自适应动态拓扑变化, 从静态韧性评估推进到主动自主保护新范式；建立了连接复杂网络韧性理论与集群自主性的跨领域方法论，同时识别了制约集群可扩展性的关键通信与数据分配瓶颈。"
      keywords:
        - 大规模集群
        - 自主协同
        - 涌现智能
        - 通信网络
        - 数据分配
        - 可扩展性
