  hero:
    greeting: Welcome to my academic homepage
    desc: Assistant Professor at National University of Defense Technology (NUDT). My research spans three directions&#58; (1) fundamental scientific problems in large-scale complex systems, failure propagation, phase transitions, and emergent behavior; (2) cyber-physical systems, resilience, distributed autonomous control, and renewable energy integration in power grids; (3) large-scale unmanned swarms, scalable autonomous coordination, emergent collective intelligence, and the communication and data infrastructure enabling swarm autonomy.
  directions:
    title: Research Directions
    d1:
      title: Large-Scale Complex Systems
      subtitle: Fundamental Scientific Problems · Failure Propagation · Phase Transitions · Emergent Behavior
      content: Investigating universal laws governing cascading failure propagation in complex networked systems. Characterizing phase transitions between stable and collapse regimes. Revealing how network topology, interdependence structure, and component dynamics collectively determine system-level robustness. Establishing a theoretical bridge between microscopic node interactions and macroscopic system behavior.
      innovation: "Contribution: Uncovered universal propagation scaling laws that transcend specific system types, revealing that cascading dynamics follow predictable phase-transition patterns governed by a small set of topological invariants. Proposed a unified theoretical framework linking steady-state vulnerability to dynamic collapse, enabling cross-domain transfer of resilience principles from power grids to broader complex systems."
      keywords:
        - Cascading Failure
        - Phase Transition
        - Network Universality
        - Complex Systems
        - Emergent Behavior
        - Topological Invariant
    d2:
      title: Cyber-Physical Systems
      subtitle: Resilience · Distributed Autonomous Control · Power System · Renewable Sources
      content: Investigating how renewable inverter-based resources (IBRs) impact cascading failures in cyber-physical power grids. Analyzing interdependence among voltage-unstable buses during cascading events. Determining optimal IBR placement and designing power network topologies for maximum resilience under high renewable penetration.
      innovation: "Contribution: Pioneered the analysis of IBR impacts on cascading failure dynamics, revealing that higher IBR penetration can paradoxically increase failure risk if improperly sited. Proposed a systematic framework for optimal IBR placement to enhance grid resilience, establishing design principles that reconcile renewable integration with system stability."
      keywords:
        - Cyber-Physical Systems
        - Resilience
        - Distributed Autonomous Control
        - IBR
        - Grid Topology
    d3:
      title: Large-Scale Unmanned Swarms
      subtitle: Scalable Autonomous Coordination · Emergent Collective Intelligence · Communication & Data Infrastructure
      content: What keeps swarms from scaling? We investigate the core bottlenecks that prevent large-scale autonomous coordination, from communication breakdowns to decision-making failures in dynamic environments. Our goal is to unlock emergent collective intelligence, where thousands of agents self-organize to tackle complex missions far beyond any individual's capability. This demands resilient communication networks that stay robust under interference, and adaptive data distribution algorithms that scale seamlessly as the swarm grows.
      innovation: "Contribution: Quantitatively characterized UAV swarm resilience under realistic EMI attack scenarios. Proposed a difficulty-aware distributed backup strategy that adapts to dynamic topology changes, advancing beyond static resilience assessment to proactive autonomous protection. Established a cross-domain methodology connecting complex network resilience theory with swarm autonomy, while identifying key communication and data-distribution bottlenecks that limit swarm scalability."
      keywords:
        - Large-Scale Swarm
        - Autonomous Coordination
        - Emergent Intelligence
        - Communication Network
        - Data Distribution
        - Scalability
