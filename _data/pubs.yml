- id: 1
  title: Dynamic Response and Resilience of Unmanned Aerial Vehicle Swarms Under Electromagnetic Interference
  titleCN: 电磁干扰下无人机集群的动态响应与韧性
  journal: Reliability Engineering & System Safety
  year: 2026
  doi: 10.1016/j.ress.2026.112516
  keywords:
    - UAV Swarm
    - EMI
    - Resilience
    - Dynamic Response
  keywordsCN:
    - 无人机集群
    - 电磁干扰
    - 韧性
    - 动态响应
  direction: 3
  highlight: First quantitative characterization of UAV swarm resilience under realistic EMI attack scenarios. Proposes a dynamic response model capturing both individual and collective swarm behaviors during interference.
  highlightCN: 首次在真实EMI攻击场景下定量刻画无人机集群韧性。提出捕获干扰期间个体与集体行为的动态响应模型。
  abstract: This paper investigates the dynamic response and resilience of unmanned aerial vehicle (UAV) swarms under electromagnetic interference (EMI). We develop a multi-agent framework that captures the cascading effects of EMI on swarm communication, coordination, and mission completion. The resilience metric is defined and quantified across different EMI intensities and swarm topologies.
  abstractCN: 研究无人机集群在电磁干扰下的动态响应与韧性。开发了多智能体框架，捕获EMI对集群通信、协调和任务完成的级联效应，定义并量化了不同EMI强度和集群拓扑下的韧性指标。

- id: 2
  title: Competitiveness of Competing Complex Systems
  titleCN: 竞争性复杂系统的竞争力分析
  journal: "Physica A: Statistical Mechanics and its Applications"
  year: 2026
  doi: 10.1016/j.physa.2025.131114
  keywords:
    - Complex Systems
    - Competition
    - Network Theory
    - Interdependence
  keywordsCN:
    - 复杂系统
    - 竞争力
    - 网络理论
    - 相互依赖
  direction: 1
  highlight: Establishes a general framework for analyzing competitiveness in interacting complex systems. Reveals that system interdependence structure is a stronger predictor of competitive outcome than individual system strength.
  highlightCN: 建立了分析相互作用的复杂系统竞争力的通用框架。揭示系统相互依赖结构比个体系统强度更能预测竞争结果。
  abstract: We propose a general framework to analyze the competitiveness of complex systems that interact and compete for shared resources. Using tools from network theory and statistical mechanics, we show how the structural properties of interdependence networks determine competitive outcomes.
  abstractCN: 提出分析竞争性复杂系统的通用框架。运用网络理论和统计力学工具，展示相互依赖网络的结构特性如何决定竞争结果。

- id: 3
  title: Distributed Data Backup for Dynamic UAV Swarms Considering Data Recovery Difficulty
  titleCN: 考虑数据恢复难度的动态无人机集群分布式数据备份
  journal: IEEE Internet of Things Journal
  year: 2026
  doi: 10.1109/JIOT.2026.3655370
  keywords:
    - UAV Swarm
    - Distributed Backup
    - Data Recovery
    - Dynamic Topology
    - IoT
  keywordsCN:
    - 无人机集群
    - 分布式备份
    - 数据恢复
    - 动态拓扑
    - 物联网
  direction: 3
  highlight: Novel difficulty-aware distributed backup strategy that adapts to dynamic swarm topology changes. Introduces a data recovery difficulty metric that guides optimal backup placement for maximum recoverability.
  highlightCN: 新颖的难度感知分布式备份策略，自适应动态集群拓扑变化。引入数据恢复难度指标，指导最优备份放置以实现最大可恢复性。
  abstract: This paper presents a distributed data backup scheme for dynamic UAV swarms that explicitly accounts for data recovery difficulty. As swarm topology evolves during missions, our adaptive strategy re-optimizes backup placement to minimize expected recovery time and maximize data survivability.
  abstractCN: 提出考虑数据恢复难度的动态无人机集群分布式数据备份方案。当集群拓扑在任务中演化时，自适应策略重新优化备份放置，最小化预期恢复时间并最大化数据生存性。

- id: 4
  title: Interdependence Among Voltage-Unstable Buses During Cascading Failure in Power Systems
  titleCN: 电力系统级联故障中电压不稳定节点间的相互依赖关系
  journal: "IEEE Transactions on Circuits and Systems I: Regular Papers"
  year: 2025
  doi: 10.1109/TCSI.2024.3420761
  keywords:
    - Interdependence
    - Voltage Stability
    - Cascading Failure
    - Power Grid
  keywordsCN:
    - 相互依赖
    - 电压稳定
    - 级联故障
    - 电力网络
  direction: 2
  highlight: First systematic characterization of interdependence relationships among voltage-unstable buses. Reveals hidden coupling structures that accelerate cascading failure propagation beyond what topology alone predicts.
  highlightCN: 首次系统刻画电压不稳定节点间的相互依赖关系。揭示超越拓扑预测的隐藏耦合结构，加速级联故障传播。
  abstract: We investigate the interdependence relationships among voltage-unstable buses during cascading failures. Using correlation analysis of voltage collapse sequences, we construct interdependence networks that reveal how the failure of one bus increases the vulnerability of others, providing new insights for targeted protection strategies.
  abstractCN: 研究级联故障中电压不稳定节点间的相互依赖关系。通过电压崩溃序列的相关性分析，构建相互依赖网络，揭示一个节点故障如何增加其他节点的脆弱性。

- id: 5
  title: Quantification of Cascading Failure Propagation in Power Systems
  titleCN: 电力系统级联故障传播的量化分析
  journal: "IEEE Transactions on Circuits and Systems I: Regular Papers"
  year: 2024
  doi: 10.1109/TCSI.2024.3383450
  keywords:
    - Cascading Failure
    - Propagation Quantification
    - Power Systems
    - Vulnerability
  keywordsCN:
    - 级联故障
    - 传播量化
    - 电力系统
    - 脆弱性
  direction: 1
  highlight: Proposes the first quantitative propagation metric for cascading failures that captures both the spatial extent and temporal speed of failure spread. Enables direct comparison of cascading risks across different grid configurations.
  highlightCN: 提出首个同时捕获故障传播空间范围和时间速度的量化传播指标。使得不同电网配置间的级联风险可以直接比较。
  abstract: This paper develops a quantitative framework for measuring cascading failure propagation in power systems. We introduce metrics that capture the spatial reach, temporal dynamics, and intensity of cascading events, enabling systematic comparison and risk assessment across different operating conditions and network topologies.
  abstractCN: 开发电力系统级联故障传播的量化框架。引入捕获级联事件空间范围、时间动力学和强度的指标体系，实现不同运行条件与网络拓扑下的系统比较与风险评估。

- id: 6
  title: The Impact of Inverter-Based Resources (IBRs) on Cascading Failures in Power Systems
  titleCN: 逆变器资源对电力系统级联故障的影响
  journal: IEEE Transactions on Power Systems
  year: 2024
  doi: 10.1109/TPWRS.2023.3339684
  keywords:
    - IBR
    - Cascading Failure
    - Renewable Energy
    - Power Grid
    - Stability
  keywordsCN:
    - IBR
    - 级联故障
    - 可再生能源
    - 电力网络
    - 稳定性
  direction: 2
  highlight: Pioneering study revealing the dual-edge effect of IBRs on grid cascading failures — higher penetration can either mitigate or amplify cascading risk depending on IBR spatial distribution and control parameters.
  highlightCN: 开创性研究揭示IBR对电网级联故障的双刃效应 — 高渗透率可能缓解或放大级联风险，取决于IBR空间分布和控制参数。
  abstract: This paper systematically analyzes how inverter-based resources (IBRs) influence cascading failure dynamics in power systems. Through extensive simulations on IEEE test systems, we demonstrate that IBR penetration level, spatial distribution, and control mode critically determine whether IBRs mitigate or exacerbate cascading failures.
  abstractCN: 系统分析逆变器资源如何影响电力系统级联故障动力学。通过IEEE标准系统的广泛仿真，论证IBR渗透水平、空间分布和控制模式如何决定其缓解或加剧级联故障的效果。

- id: 7
  title: Where Should Inverter-Based Resources Be Located in Power Networks?
  titleCN: 逆变器资源应部署于电网何处？
  journal: "IEEE Transactions on Circuits and Systems I: Regular Papers"
  year: 2024
  doi: 10.1109/TCSI.2023.3336069
  keywords:
    - IBR
    - Optimal Placement
    - Power Network
    - Grid Stability
  keywordsCN:
    - IBR
    - 最优配置
    - 电力网络
    - 电网稳定性
  direction: 2
  highlight: First systematic optimization framework for IBR placement considering cascading failure resilience. Identifies counter-intuitive results — the best locations for normal-operation efficiency may be the worst for failure resilience.
  highlightCN: 首个考虑级联故障韧性的IBR配置系统优化框架。得出反直觉结论 — 正常运行效率最佳的位置可能是故障韧性最差的位置。
  abstract: We address the critical question of optimal IBR placement in power networks. Formulating it as a multi-objective optimization problem balancing efficiency and resilience, we reveal fundamental trade-offs and provide design guidelines for integrating renewables without compromising grid robustness.
  abstractCN: 解决电网中IBR最优配置的关键问题。将其建模为平衡效率与韧性的多目标优化问题，揭示基本权衡关系，提供不损害电网鲁棒性的可再生能源集成设计指南。

- id: 8
  title: Steady-State Cascading Failure Model With Voltage Instability Event Detection
  titleCN: 集成电压失稳事件检测的稳态级联故障模型
  journal: "IEEE Transactions on Circuits and Systems I: Regular Papers"
  year: 2024
  doi: 10.1109/TCSI.2023.3324575
  keywords:
    - Cascading Failure
    - Voltage Instability
    - Steady-State Model
    - Event Detection
  keywordsCN:
    - 级联故障
    - 电压失稳
    - 稳态模型
    - 事件检测
  direction: 1
  highlight: First steady-state cascading failure model with built-in voltage instability detection. Eliminates the need for computationally expensive dynamic simulations while maintaining accuracy in identifying voltage collapse events.
  highlightCN: 首个内嵌电压失稳检测的稳态级联故障模型。在保持电压崩溃事件识别精度的同时，消除了对计算昂贵的动态仿真的需求。
  abstract: This paper presents a novel steady-state cascading failure model that incorporates voltage instability event detection. Unlike traditional models that rely on full dynamic simulations, our approach uses an iterative power flow framework with embedded stability criteria to detect voltage collapse events efficiently.
  abstractCN: 提出集成电压失稳事件检测的新型稳态级联故障模型。不同于依赖全动态仿真的传统模型，采用迭代潮流框架并嵌入稳定性判据，高效检测电压崩溃事件。

- id: 9
  title: Which Kind of Power Network Topology Is More Robust?
  titleCN: 何种电网拓扑更鲁棒？
  journal: "IEEE Transactions on Circuits and Systems I: Regular Papers"
  year: 2024
  doi: 10.1109/TCSI.2024.3424314
  keywords:
    - Network Topology
    - Robustness
    - Power Grid Design
    - Complex Networks
  keywordsCN:
    - 网络拓扑
    - 鲁棒性
    - 电网设计
    - 复杂网络
  direction: 2
  highlight: Comprehensive case study providing actionable design principles for robust power grid topology. Challenges conventional wisdom — meshed networks are not always more robust; identifies specific topological features that dominate robustness.
  highlightCN: 全面案例研究为鲁棒电网拓扑提供可操作设计原则。挑战传统认知 — 网状网络并非总是更鲁棒；识别出主导鲁棒性的特定拓扑特征。
  abstract: Through systematic comparison of different power network topologies under various failure scenarios, we identify which topological features most strongly determine grid robustness. Our case study provides concrete design recommendations for building inherently robust power networks.
  abstractCN: 通过不同故障场景下电网拓扑的系统比较，识别哪些拓扑特征最强地决定电网鲁棒性。为构建本质鲁棒的电力网络提供具体设计建议。

- id: 10
  title: Identification of Nodes Most Vulnerable to Voltage Collapse in Cascading Failures of Power Systems
  titleCN: 电力系统级联故障中最易发生电压崩溃节点的识别
  journal: 2023 IEEE International Symposium on Circuits and Systems (ISCAS)
  year: 2023
  doi: 10.1109/ISCAS46773.2023.10181960
  keywords:
    - Voltage Collapse
    - Vulnerability
    - Cascading Failure
    - Node Identification
  keywordsCN:
    - 电压崩溃
    - 脆弱性
    - 级联故障
    - 节点识别
  direction: 1
  highlight: Develops an efficient algorithm for identifying the most voltage-collapse-vulnerable nodes without exhaustive N-k contingency simulation. Achieves over 90% accuracy while reducing computational cost by orders of magnitude.
  highlightCN: 开发无需穷举N-k事故仿真的最易电压崩溃节点高效识别算法。实现90%以上精度，同时降低数个数量级的计算成本。
  abstract: We propose a method to identify nodes most vulnerable to voltage collapse during cascading failures. By combining topological analysis with simplified power flow models, our approach ranks node vulnerability without requiring exhaustive contingency simulation.
  abstractCN: 提出识别级联故障中最易电压崩溃节点的方法。结合拓扑分析与简化潮流模型，无需穷举事故仿真即可对节点脆弱性进行排序。

- id: 11
  title: Cascading Failure Propagation and Mitigation Strategies in Power Systems
  titleCN: 电力系统级联故障传播与缓解策略
  journal: IEEE Systems Journal
  year: 2023
  doi: 10.1109/JSYST.2023.3248044
  keywords:
    - Cascading Failure
    - Mitigation
    - Propagation
    - Power Systems
  keywordsCN:
    - 级联故障
    - 缓解
    - 传播
    - 电力系统
  direction: 1
  highlight: Establishes a unified propagation-to-mitigation framework. Proposes three complementary mitigation strategies — topological, operational, and protective — and demonstrates their synergistic benefits when combined.
  highlightCN: 建立传播到缓解的统一框架。提出三种互补缓解策略 — 拓扑、运行和保护 — 并证明三者协同配合时的收益。
  abstract: This paper comprehensively examines cascading failure propagation mechanisms and proposes integrated mitigation strategies. We categorize mitigation approaches into topological, operational, and protective layers, and show that coordinated multi-layer strategies significantly outperform any single approach.
  abstractCN: 全面审视级联故障传播机制并提出集成缓解策略。将缓解方法分为拓扑层、运行层和保护层，证明多层协调策略显著优于单一方法。

